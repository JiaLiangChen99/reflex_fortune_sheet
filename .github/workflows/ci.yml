name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Smoke checks — no pytest suite / [dev] extra in this repo yet.
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Keep in sync with requires-python in pyproject.toml (>=3.13).
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import smoke test
        run: |
          python -c "from reflex_fortune_sheet import fortune_sheet, FortuneSheet; print(FortuneSheet.__name__)"

  build:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel includes fortune_sheet.jsx
        run: |
          python - <<'PY'
          import glob, zipfile
          wheels = glob.glob("dist/*.whl")
          assert wheels, "no wheel built"
          names = zipfile.ZipFile(wheels[0]).namelist()
          assert "reflex_fortune_sheet/fortune_sheet.jsx" in names, names
          assert "reflex_fortune_sheet/__init__.py" in names, names
          print("OK:", wheels[0])
          print("\n".join(n for n in names if n.startswith("reflex_fortune_sheet/")))
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
